# nginx — replace /etc/nginx/conf.d/thegoalposts.conf
# After certbot, keep the ssl_certificate lines in the www server block.

# Apex → www (fixes bad :3000 redirects from the app)
server {
    listen 443 ssl;
    server_name thegoalposts.in;
    ssl_certificate /etc/letsencrypt/live/thegoalposts.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thegoalposts.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.thegoalposts.in$request_uri;
}

server {
    listen 80;
    server_name thegoalposts.in;
    return 301 https://www.thegoalposts.in$request_uri;
}

server {
    listen 443 ssl;
    server_name www.thegoalposts.in;
    ssl_certificate /etc/letsencrypt/live/thegoalposts.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thegoalposts.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 15s;
    }
}

server {
    listen 80;
    server_name www.thegoalposts.in;
    return 301 https://www.thegoalposts.in$request_uri;
}
